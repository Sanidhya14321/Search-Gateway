services:
  - type: web
    name: crmind-api
    runtime: python
    buildCommand: pip install -r requirements.prod.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_JWT_EXPIRES_HOURS
        value: "24"
      - key: INTERNAL_SERVICE_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: WARNING
      - key: RESPECT_ROBOTS_TXT
        value: "true"
      - key: CACHE_TTL_SECONDS
        value: 3600
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,https://search-gateway-tau.vercel.app,https://search-gateway.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://[a-z0-9-]+\.vercel\.app$|^http://localhost(:\d+)?$
